<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Menu - Roti Kadet Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        .animate-pop { animation: popCheck 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes popCheck { 0% { transform: scale(0.96); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="text-slate-100 min-h-screen overflow-x-hidden">

    <div class="flex flex-col lg:flex-row min-h-screen w-full">
        <!-- SEKTOR KIRI: MENU MAKANAN -->
        <div class="w-full lg:w-2/3 p-4 lg:p-6 flex flex-col justify-between bg-[#0e1424]">
            <div>
                <header class="mb-5 bg-[#151f32] p-5 rounded-2xl border border-slate-800 text-center shadow-2xl">
                    <h1 class="text-xl font-black text-amber-400 tracking-tight">🍞 ROTI KADET PREMIUM</h1>
                    <p class="text-xs text-slate-400 mt-1">E-Menu Smart Ordering System</p>
                </header>

                <!-- INPUT IDENTITAS PELANGGAN DI HP -->
                <div class="grid grid-cols-2 gap-3 mb-5 bg-[#121a2c] p-3 rounded-2xl border border-slate-800/80">
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Nama Anda</label>
                        <input type="text" id="cust-name-online" class="w-full bg-[#1a233a] border border-slate-700/60 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-amber-400" placeholder="Input Nama">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-amber-400 uppercase tracking-wider block mb-1">No. Antrean Anda (Live)</label>
                        <input type="text" id="cust-queue-online" class="w-full bg-[#251e15] border border-amber-500/20 rounded-xl px-3 py-2 text-xs text-amber-400 font-extrabold font-mono focus:outline-none" readonly value="Loading...">
                    </div>
                </div>

                <div class="flex gap-2 mb-5 bg-[#151f32] p-1.5 rounded-xl self-start max-w-full overflow-x-auto whitespace-nowrap border border-slate-800/60">
                    <button onclick="filterKategori('all')" id="btn-all" class="category-btn px-4 py-1.5 bg-amber-500 text-slate-950 rounded-lg font-bold text-xs transition-all cursor-pointer">Semua Menu</button>
                    <button onclick="filterKategori('original')" id="btn-original" class="category-btn px-4 py-1.5 text-slate-400 rounded-lg font-semibold text-xs hover:text-slate-200 transition-all cursor-pointer">Original</button>
                    <button onclick="filterKategori('pandan')" id="btn-pandan" class="category-btn px-4 py-1.5 text-slate-400 rounded-lg font-semibold text-xs hover:text-slate-200 transition-all cursor-pointer">Pandan</button>
                    <button onclick="filterKategori('toping')" id="btn-toping" class="category-btn px-4 py-1.5 text-slate-400 rounded-lg font-semibold text-xs hover:text-slate-200 transition-all cursor-pointer">Premium Topping</button>
                </div>

                <div id="loading-produk" class="text-center py-16 text-xs font-bold text-slate-500 animate-pulse">Menyiapkan racikan menu dapur...</div>
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 pb-6 hidden" id="product-grid"></div>
            </div>
        </div>

        <!-- SEKTOR KANAN: CHECKOUT BILL -->
        <div class="w-full lg:w-1/3 bg-[#111726] flex flex-col shadow-2xl lg:h-screen lg:sticky lg:top-0 border-l border-slate-800/60">
            <div class="px-4 py-4 border-b border-slate-800 flex justify-between items-center bg-[#141c30] shrink-0">
                <h2 class="font-extrabold text-slate-200 flex items-center gap-2 text-xs uppercase tracking-wider">
                    🛒 Pesanan Saya (<span id="cart-count">0</span>)
                </h2>
                <button onclick="kosongkanKeranjang()" class="text-xs text-rose-400 hover:text-rose-300 font-bold cursor-pointer">Clear All</button>
            </div>

            <div class="p-3 space-y-2 lg:overflow-y-auto lg:flex-1" id="cart-items">
                <div class="text-center text-slate-500 py-12 text-xs">Belum ada hidangan dipilih</div>
            </div>

            <div class="p-4 border-t border-slate-800 bg-[#131b2e] space-y-4 mt-auto shadow-inner pb-8 lg:pb-4">
                <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wide">TOTAL ESTIMASI</span>
                    <span id="total-harga" class="text-2xl font-black text-amber-400 font-mono">Rp 0</span>
                </div>

                <button onclick="kirimPesanan()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-black py-4 rounded-xl shadow-lg transition-all text-xs tracking-wider cursor-pointer">
                    🚀 KIRIM PESANAN KE KASIR
                </button>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbylzzlim-KCh5985YTcm4vsFAY6McqV5ImBZtAGGcjbs9XQ_eA0iD3xPatayz0MX8YC/exec';

        let produk = [];
        let keranjang = [];
        let kategoriAktif = 'all';
        let liveAntreanNumberPembeli = 1;

        tarikDataMenuOnline();

        function tarikDataMenuOnline() {
            fetch(GOOGLE_SCRIPT_URL)
                .then(res => res.json())
                .then(data => {
                    produk = data.produk;
                    liveAntreanNumberPembeli = data.nextAntrean;
                    document.getElementById('cust-queue-online').value = "No. Antrean #" + liveAntreanNumberPembeli;
                    
                    document.getElementById('loading-produk').classList.add('hidden');
                    document.getElementById('product-grid').classList.remove('hidden');
                    tampilkanProduk();
                }).catch(err => {
                    document.getElementById('loading-produk').innerText = "Database offline.";
                });
        }

        function tampilkanProduk() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            produk.forEach(p => {
                if (kategoriAktif !== 'all' && p.kategori !== kategoriAktif) return;
                let isHabis = p.stok <= 0;
                let cardStyle = isHabis ? 'opacity-30 pointer-events-none' : 'hover:border-slate-700 active:scale-95 cursor-pointer';
                let labelStok = isHabis ? '<span class="text-[10px] bg-rose-500/10 border border-rose-500/20 text-rose-400 px-1.5 py-0.2 rounded font-bold">Sold Out</span>' : `<span class="text-slate-400 text-[11px]">Stok: ${p.stok}</span>`;

                grid.innerHTML += `
                    <div onclick="tambahKeKeranjang(${p.id})" class="bg-[#131b2e] border border-slate-800/80 rounded-2xl overflow-hidden flex flex-col justify-between transition-all shadow-lg ${cardStyle} animate-pop">
                        <div class="relative overflow-hidden h-24 bg-slate-900/20">
                            <img src="${p.foto}" class="w-full h-full object-cover" alt="${p.nama}" onerror="this.src='https://placehold.co/200x150?text=Food'">
                        </div>
                        <div class="p-3 flex flex-col justify-between flex-1">
                            <h3 class="font-bold text-slate-200 text-xs truncate">${p.nama}</h3>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-amber-400 font-extrabold text-xs">Rp ${p.harga.toLocaleString('id-ID')}</span>
                                ${labelStok}
                            </div>
                        </div>
                    </div>`;
            });
        }

        function filterKategori(kat) {
            kategoriAktif = kat;
            tampilkanProduk();
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.className = "category-btn px-4 py-1.5 text-slate-400 rounded-lg font-semibold text-xs hover:text-slate-200 transition-all cursor-pointer";
            });
            document.getElementById('btn-' + kat).className = "category-btn px-4 py-1.5 bg-amber-500 text-slate-950 rounded-lg font-bold text-xs shadow-md transition-all cursor-pointer";
        }

        function tambahKeKeranjang(id) {
            const prod = produk.find(p => p.id === id);
            const ada = keranjang.find(item => item.id === id);
            let qtySekarang = ada ? ada.qty : 0;
            if (qtySekarang >= prod.stok) return alert("Pemesanan dibatalkan, kuota limit stok gudang tercapai.");

            if (ada) { ada.qty++; } else { keranjang.push({ ...prod, qty: 1 }); }
            updateKeranjang();
        }

        function ubahQty(id, jumlah) {
            const item = keranjang.find(i => i.id === id);
            const prod = produk.find(p => p.id === id);
            if (!item) return;

            if (jumlah > 0 && item.qty >= prod.stok) return alert("Batas maksimal stok tercapai.");

            item.qty += jumlah;
            if (item.qty <= 0) { keranjang = keranjang.filter(i => i.id !== id); }
            updateKeranjang();
        }

        function kosongkanKeranjang() { keranjang = []; updateKeranjang(); }

        function updateKeranjang() {
            const container = document.getElementById('cart-items');
            document.getElementById('cart-count').innerText = keranjang.reduce((sum, i) => sum + i.qty, 0);

            if (keranjang.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-500 py-12 text-xs">Belum ada hidangan dipilih</div>`;
                document.getElementById('total-harga').innerText = "Rp 0";
                return;
            }

            container.innerHTML = '';
            let kuotaToppingGratis = 0;
            keranjang.forEach(item => {
                if (item.kategori === 'original' || item.kategori === 'pandan') { kuotaToppingGratis += item.qty; }
            });

            let total = 0;
            keranjang.forEach(item => {
                let sub = 0;
                let infoPromo = '';
                
                if (item.kategori === 'toping') {
                    let qtyToppingIni = item.qty;
                    let qtyBayar = 0;

                    if (kuotaToppingGratis > 0) {
                        if (kuotaToppingGratis >= qtyToppingIni) {
                            kuotaToppingGratis -= qtyToppingIni;
                            qtyBayar = 0;
                            infoPromo = `<span class="text-[9px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-1.5 py-0.2 rounded font-bold ml-1">Promo Free</span>`;
                        } else {
                            qtyBayar = qtyToppingIni - kuotaToppingGratis;
                            infoPromo = `<span class="text-[9px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-1.5 py-0.2 rounded font-bold ml-1">Free ${kuotaToppingGratis} Pcs</span>`;
                            kuotaToppingGratis = 0;
                        }
                    } else { qtyBayar = qtyToppingIni; }
                    sub = item.harga * qtyBayar;
                } else { sub = item.harga * item.qty; }

                total += sub;

                container.innerHTML += `
                    <div class="flex justify-between items-center bg-[#151e33] p-2.5 rounded-xl border border-slate-800/80 text-xs animate-pop">
                        <div class="w-7/12 truncate">
                            <p class="font-bold text-slate-200 truncate flex items-center">${item.nama} ${infoPromo}</p>
                            <p class="text-[10px] text-slate-500 mt-0.5">Rp ${item.harga.toLocaleString('id-ID')} x ${item.qty}</p>
                        </div>
                        <div class="w-5/12 flex items-center justify-end gap-2">
                            <span class="font-bold text-slate-200 font-mono">Rp ${sub.toLocaleString('id-ID')}</span>
                            <div class="flex border border-slate-700 bg-[#1b253e] rounded-lg overflow-hidden shadow-sm">
                                <button onclick="ubahQty(${item.id}, -1)" class="px-2 py-0.5 bg-slate-800 text-slate-300 font-black active:bg-slate-700">-</button>
                                <span class="px-1.5 py-0.5 font-bold text-slate-200">${item.qty}</span>
                                <button onclick="ubahQty(${item.id}, 1)" class="px-2 py-0.5 bg-slate-800 text-slate-300 font-black active:bg-slate-700">+</button>
                            </div>
                        </div>
                    </div>`;
            });

            document.getElementById('total-harga').innerText = `Rp ${total.toLocaleString('id-ID')}`;
        }

        function kirimPesanan() {
            if (keranjang.length === 0) return alert("Pilih menu terlebih dahulu!");
            const nameOnline = document.getElementById('cust-name-online').value.trim();
            if (!nameOnline) return alert("Harap masukkan Nama Anda terlebih dahulu!");

            const total = parseInt(document.getElementById('total-harga').innerText.replace(/[^0-9]/g, ''));
            const notaId = 'QR-' + Math.floor(100000 + Math.random() * 900000);
            const waktuSkrg = new Date().toLocaleString('id-ID');
            let ringkasanItem = [];
            keranjang.forEach(item => ringkasanItem.push(`${item.nama} [x${item.qty}]`));

            fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: notaId, tanggal: waktuSkrg, pelanggan: nameOnline, antreanNum: liveAntreanNumberPembeli, items: ringkasanItem.join(', '), total: total, cartData: keranjang, status: "ANTREAN" })
            }).then(() => {
                alert(`Pesanan sukses dikirim!\n\nNama: ${nameOnline}\nNomor Antrean Anda: No. ${liveAntreanNumberPembeli}\n\nSilakan ke kasir untuk konfirmasi bill Anda.`);
                keranjang = [];
                document.getElementById('cust-name-online').value = '';
                updateKeranjang();
                tarikDataMenuOnline(); 
            }).catch(err => alert("Gangguan jaringan, silakan kirim ulang."));
        }
    </script>
</body>
</html>
